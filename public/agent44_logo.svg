<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Black backdrop (matches original logo) -->
  <rect width="512" height="512" fill="#000000"/>

  <!-- Everything orange -->
  <g fill="#F26B1F">
    <!-- Antenna -->
    <rect x="252" y="40" width="8" height="97" rx="2"/>
    <circle cx="256" cy="36" r="12"/>

    <!-- Head (25% smaller) -->
    <rect x="188" y="137" width="135" height="111" rx="10"/>

    <!-- Torso (head sits directly on top, no neck — 15% smaller) -->
    <rect x="157" y="248" width="198" height="155" rx="10"/>

    <!-- Arms (shoulder stubs + forearms) -->
    <rect x="125" y="284" width="36" height="24" rx="6"/>
    <rect x="351" y="284" width="36" height="24" rx="6"/>
    <rect x="129" y="308" width="22" height="72" rx="6"/>
    <rect x="361" y="308" width="22" height="72" rx="6"/>
    <!-- Hands -->
    <circle cx="140" cy="390" r="16"/>
    <circle cx="372" cy="390" r="16"/>

    <!-- Legs (no feet) -->
    <rect x="196" y="403" width="44" height="52" rx="4"/>
    <rect x="272" y="403" width="44" height="52" rx="4"/>
  </g>

  <!-- The 44 — big, slab-serif, centered on chest -->
  <text x="256" y="373" font-family="'Rockwell', 'Roboto Slab', Georgia, serif"
        font-weight="900" font-size="115" text-anchor="middle"
        fill="#FFFFFF">44</text>
</svg>
