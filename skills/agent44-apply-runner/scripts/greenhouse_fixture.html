<!doctype html>
<html><head><meta charset="utf-8"><title>Careers - Apply for this Job</title></head>
<body style="font-family:system-ui;max-width:640px;margin:40px auto">
  <h1>Senior SDET (Remote) — Application</h1>
  <!-- Mirrors Greenhouse's standard field ids so the runner's fill path can be verified offline. -->
  <form id="application_form">
    <p><label for="first_name">First Name *</label><br><input id="first_name" name="first_name" type="text"></p>
    <p><label for="last_name">Last Name *</label><br><input id="last_name" name="last_name" type="text"></p>
    <p><label for="email">Email *</label><br><input id="email" name="email" type="email"></p>
    <p><label for="phone">Phone</label><br><input id="phone" name="phone" type="tel"></p>
    <p><label for="resume">Resume/CV *</label><br><input id="resume" name="resume" type="file"></p>
    <p><label for="q_linkedin">LinkedIn Profile</label><br><input id="q_linkedin" name="q_linkedin" type="text" aria-label="LinkedIn Profile"></p>
    <button id="submit_app" type="submit">Submit Application</button>
  </form>
</body></html>
