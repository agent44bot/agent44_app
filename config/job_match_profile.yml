  - react
  - hotwire
  - turbo
  - tailwind
  - capacitor
  - mobile
  - ios
  - android
  - sdet
  - test automation
  - qa
  - quality engineering
  - quality assurance
  - claude
  - anthropic
  - openai
  - gpt
  - llm
  - rag
  - mcp
  - langchain
  - vector
  - prompt engineering
  - ai agent
