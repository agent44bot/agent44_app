# Rich Downie's job-match profile — drives JobMatcher scoring, the For You feed
# (/jobs/for-me), and the daily digest email. Tune weights/skills here; no code
# change needed. See app/lib/job_matcher.rb.

candidate:
  name: Rich Downie
  email: botwhisperer@hey.com
  location: Rochester, NY

# Priority (his call, 2026-06-01): lead with agent/AI-engineer + Forward-Deployed
# Engineer roles — that's now the target. agent_director ranks highest; AI-augmented
# QA is the strong fallback (25 yrs SDET = instant credibility, most listings);
# pure test automation is the safety net. FDE/agent terms also get the dream bonus.
role_class_weights:
  agent_director: 40
  ai_augmented: 34
  traditional: 20

# Skill overlap: each skill found (word-boundary) in title+description counts;
# up to 8 contribute to the score. Lowercase.
skills:
  - ruby
  - ruby on rails
  - rails
  - playwright
  - selenium
  - appium
  - cucumber
  - cypress
  - capybara
  - rspec
  - typescript
  - javascript
  - python
  - sql
  - github actions
  - ci/cd
  - jenkins
  - gitlab
  - circleci
  - aws
  - fly.io
  - docker
  - postgres
  - postgresql
  - rest
  - api
  - graphql
  - react
  - hotwire
  - turbo
  - tailwind
  - capacitor
  - mobile
  - ios
  - android
  - sdet
  - test automation
  - qa
  - quality engineering
  - quality assurance
  - claude
  - anthropic
  - openai
  - gpt
  - llm
  - rag
  - mcp
  - langchain
  - vector
  - prompt engineering
  - ai agent
  - agentic
  - agent

# Title/description seniority signals (his level).
seniority_keywords: [senior, principal, staff, lead, architect, sdet]

# Roles leaning on these as core skills are a poor fit (his honest gaps).
gap_keywords: [java, "c#", ".net", kotlin, swift, scala, golang, rust, kubernetes, k8s, terraform]

# Presence flags a role as a 'dream/stretch' true agent-engineering job.
dream_keywords: [ai agent, agentic, autonomous agent, llm agent, agent engineer, multi-agent, agent framework, ai engineer, forward deployed, forward-deployed, forward deployed engineer, fde]

remote_preference: strong            # Rochester, NY — remote strongly preferred
employment_open: [full_time, part_time, contract]  # PT/contract OK to ease the transition

# Current comp = $160K. Listings with an explicit annual salary below this get
# ranked down (graduated penalty, capped). Roles with no posted salary, or
# hourly/contract rates, are left neutral (not penalized). Set to 0 to disable.
salary_floor: 160000

# --- Apply kit -------------------------------------------------------------
# Powers the For You "Prep application" kit: the standard screening answers Rich
# reviews/pastes, plus grounding for the AI-written cover letter. He has final
# say and submits everything himself — nothing here auto-submits.
application:
  full_name: Rich Downie
  contact_email: botwhisperer@hey.com
  phone: "+1 (585) 766-7424"
  location: "Rochester, NY"
  work_authorization: "U.S. citizen; no sponsorship required"
  salary_expectation: "$150,000+"     # stated on apps; ranking floor is $160K (salary_floor)
  arrangement: "Remote (open to hybrid); based in Rochester, NY; not relocating"
  start_availability: "Two weeks' notice"
  years_experience: "10+"             # capped-dropdown answer; résumé shows the full 25-yr history
  education: "BS, Business (minor in Computer Science)"  # TODO: add school name once richdownie.com is updated
  links:
    LinkedIn: "https://www.linkedin.com/in/richdownie/"
