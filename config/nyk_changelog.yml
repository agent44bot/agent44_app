# Owner-facing "what's new" notes for the NY Kitchen weekly team report.
#
# Add a dated, plain-language one-liner whenever you ship a user-facing NYK
# change (skip internal refactors/bugfixes the owner wouldn't notice). Carson
# surfaces entries from the last 7 days in the Sunday report, newest first.
# Keep each note short, concrete, and written for Lora — not for engineers.
#
#   - date: 2026-05-28
#     note: Plain sentence about what changed and why it helps.

- date: 2026-06-08
  note: New on the Analyst dashboard: a "Generate report" button. You can now pull a fresh copy of this team report whenever you need one (for example, right before a board meeting), then print it, save it as a PDF, or email it to anyone with one tap, a board member, an outside developer, or yourself. There is a short "How it works" walkthrough on the page.

- date: 2026-06-08
  note: Your team's weekly recap now lands twice a week, every Monday and Friday at 10 AM, instead of Sunday evening. Monday's covers the week that just finished; Friday's is a mid-week check on how the current week is filling. The daily "selling fast" digest still arrives at 10 AM on the other days.

- date: 2026-06-04
  note: Carson can now send a couple of helpful pings a day to the iOS app (on for a few of us while we try it out), like a slow sales day, flyers due for a reprint, or a class down to its last seats. Each one opens the right agent with a tap.

- date: 2026-05-31
  note: The Analyst dashboard now shows yesterday's and today's ticket sales at a glance, so you can see fresh momentum without changing the date range.

- date: 2026-05-31
  note: The sales report's current-month row is now labelled "Rest of <month>" so a near-sold-out final few classes no longer reads as if the whole month hit 100%.

- date: 2026-05-30
  note: Billing now keeps a record of each finished month. On the 1st, last month's usage is locked into a dated invoice you can see under "Past invoices", with a paid or unpaid status.

- date: 2026-05-29
  note: The sales report now looks several months ahead, with a row for each of the next few calendar months (by name, like June and July), so you can see how upcoming classes are filling before they're close.

- date: 2026-05-29
  note: New Cellar tool tracks your storage room. Scan cases in, scan bottles out, and see live bottle counts with low-stock alerts.

- date: 2026-05-28
  note: Argus now checks both printed schedules — the flyer and the stall poster — every hour for broken or wrong photos.

- date: 2026-05-28
  note: Your agents now file one Sunday evening report together, introduced by Carson.

- date: 2026-05-27
  note: Iris's dashboard can now show sales for past periods (last week, last month) alongside what's coming up, and opens on the current week.

- date: 2026-05-26
  note: The class flyer can no longer show the wrong "building" photo for a class — the right photo is picked automatically.
