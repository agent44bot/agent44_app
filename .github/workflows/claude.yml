# Claude PR agent - thin caller. Drop this file into any agent44bot repo
# (bin/claude-agent-install does it for you) and set the CLAUDE_CODE_OAUTH_TOKEN
# secret. All logic lives in the reusable workflow in agent44_app.
#
#   - every non-draft PR gets an automatic review
#   - "@claude" in an issue/PR comment answers questions / makes changes
#   - labeling an issue "claude" implements it and opens a PR

name: Claude

on:
  pull_request:
    # synchronize: the auto-review is a required status check on main, so it
    # must re-run on every push to the PR branch.
    types: [opened, ready_for_review, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, labeled]

jobs:
  claude:
    uses: agent44bot/agent44_app/.github/workflows/claude-agent.yml@main
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
