# Owner-facing "what's new" notes for the NY Kitchen weekly team report.
#
# Add a dated, clear one-liner whenever you ship a user-facing NYK
# change (skip internal refactors/bugfixes the owner wouldn't notice). Carson
# surfaces entries from the last 7 days in the Sunday report, newest first.
# Keep each note short, concrete, and written for Lora — not for engineers.
#
#   - date: 2026-06-12
#     note: Plain sentence about what changed and why it helps.

- date: 2026-07-03
  note: Echo can now send a phone notification when it spots a new conversation worth joining, with a tap that takes you straight to the Conversations list on the Echo page to review and reply.

- date: 2026-07-03
  note: Phone notifications are no longer held overnight. They can now arrive any time of day. If you would rather not be pinged at night, use your phone's Do Not Disturb or Focus, or mute the app, and remember you can still turn social notifications off per person in Settings.

- date: 2026-07-02
  note: On phones, the little Background agents buttons (Iris, Scout, Carson and friends) now sit below your main agent cards instead of crowding the top of the screen. On a computer they stay up top as before.

- date: 2026-07-02
  note: Echo can now watch Bluesky and Reddit for local food and cooking conversations near Canandaigua and the Finger Lakes, and drafts a friendly reply for each one worth joining. They show up in a Conversations list on the Echo page for you to review, edit, and post yourself. Nothing is ever posted automatically, and it stays off until you ask us to switch it on.

- date: 2026-07-02
  note: Every NY Kitchen page now has a consistent header. Your team's avatars show up top next to the page buttons (like New post and Add a class), so you can see at a glance who is on the workspace wherever you are.

- date: 2026-07-02
  note: Social posts about a class now go out as a tappable preview card, so the photo and headline link straight to that class's signup page on X and Bluesky. Every class post also includes the booking link in the text.

- date: 2026-07-01
  note: Sam can now draft social posts for classes that still have seats and ping your phone to review and post them, up to twice a day at random times. It stays off until you ask us to switch it on, and nothing posts on its own; you always tap to publish.

- date: 2026-07-01
  note: The Push notifications settings now only show the phone types you actually use. If you only have an iPhone, the Android switch is hidden (and vice versa), so there is less clutter.

- date: 2026-07-01
  note: You can now turn social notifications on or off for yourself on the Settings page (under Push notifications). They are on by default, so flip the "Social notifications" switch off if you would rather not be pinged about likes, reposts, and replies.

- date: 2026-07-01
  note: Tapping a social engagement notification now jumps straight to that post in Recent Posts (right platform tab, scrolled to it and briefly highlighted), where "View on X" opens the live post to reply.

- date: 2026-06-30
  note: Social engagement notifications are now quieter. They no longer go out overnight (held from 9:00 PM to 8:00 AM Eastern), and they can be limited to specific team members so not everyone gets pinged.

- date: 2026-06-30
  note: Connecting X is more reliable too. If X has a brief hiccup during the connect step (either getting the token or reading your profile), the app now retries automatically instead of making you start the authorize flow over.

- date: 2026-06-30
  note: Your X connection is steadier. A brief X outage no longer kicks the account into "needs reconnect"; the system now waits and retries on its own, and only asks you to reconnect when X has actually revoked access.

- date: 2026-06-30
  note: Echo now sends a phone notification when one of your X or Bluesky posts gets new likes, reposts, or replies (for example "+2 likes, +1 reply on your X post"). Everyone on the NY Kitchen team gets it, and anyone can mute these from their notification settings.

- date: 2026-06-30
  note: The agent cards on the NY Kitchen home page are now a collapsible "Field Roster" section. Tap the header to fold the cards away when you want a cleaner page; your choice is remembered. The header always shows how many agents are on duty and how many need attention.

- date: 2026-06-30
  note: Every agent page (and the NY Kitchen home page) now shows a breadcrumb trail at the top (Workspaces / NY Kitchen / agent), so you always know where you are and can jump back in one tap.

- date: 2026-06-30
  note: The class search box on Sam's list now matches on class name and dish only (no longer on chef name), and the placeholder reads "Search classes by name or dish".

- date: 2026-06-30
  note: Social posts no longer fail when they run long. Each network now gets a version trimmed to its own size limit (X is the shortest), keeping the reservation link, so a post can go to X, Bluesky, and Facebook at once without one of them rejecting it.

- date: 2026-06-30
  note: Private bookings and buyouts (anything marked Private) no longer show on the printed class flyer or the bathroom stall poster, so those handouts only list classes the public can actually book.

- date: 2026-06-28
  note: On the Equipment Items tab you can now tap "Ask Agent Sam to update equipment items" and Sam reads the recipe and fills in the gear each station needs. It adds to whatever you already have, so nothing you set by hand is lost.

- date: 2026-06-28
  note: Your agents now have profile photos. Every bot shows a friendly stock avatar on the roster, and from workspace settings (Agent photos) you can give any one of them its own picture.

- date: 2026-06-28
  note: Recipes now draft themselves when you open a class that has none. Open a class on Sam's list and a recipe draft is ready to review and edit, with a starter equipment list. A repeating class (like Chef's Table) carries forward the last run's recipe at no cost, and you can always replace any draft with your own PDF. To keep costs down, drafting only runs for classes within about six weeks or already selling, and there is an on/off switch on the billing page.

- date: 2026-06-27
  note: Profile photos now show up instantly. The moment you pick a picture you see a preview before saving, and photos load faster everywhere because they are resized down instead of sent at full phone-camera size.

- date: 2026-06-26
  note: You can now add a profile photo on your Settings page. Your photo (or your initials if you skip it) shows next to your name in the workspace member list and in the team row at the top of the Workspaces page.

- date: 2026-06-26
  note: Grocery price estimates are now hidden by default until real prices are uploaded. A new toggle (Show grocery price estimates) right on the grocery list page lets a manager turn the rough dollar figures back on whenever you want them.

- date: 2026-06-26
  note: The daily NY Kitchen email now has an Android (Google Play) button next to the iOS one, so the team can open the app on Android too (early access for now).

- date: 2026-06-26
  note: Recipe handouts are now called Class packets. A packet holds everything for one class (its recipes, the equipment to set up at each station, and the pull sheet). The editor now has three tabs (Recipes, Equipment Items, Pull sheet), and Recipes and Pull sheet each print. You still create one from a class on Sam's list (tap Add). Old recipe links still work.

- date: 2026-06-25
  note: The recipe Pull sheet tab now has a Print button that opens the print-ready sheet and brings up the print dialog automatically (on the iPad and iPhone app it opens in Safari, where printing works).

- date: 2026-06-25
  note: On the Add a recipe page, the "Or copy an existing recipe" search now filters as you type (like the class list and Recipe Library), with no Search button and no page reload.

- date: 2026-06-25
  note: You can open the NY Kitchen how-to guide any time from the How-to guide link at the top of your workspace, so everyone always has the latest version.

- date: 2026-06-25
  note: Tidier class list. The Draft Post button is now a small megaphone next to each class name, and the per-class Pull Sheet button moved into the handout (open a class's handout and use its Pull sheet tab to view or print the pull sheet).

- date: 2026-06-25
  note: Consistent wording on the recipe pages. A handout is the printable packet for a class (it can hold more than one recipe), so the editor header reads "Review the handout" and its first tab is "Recipes". Nothing changed about how it works.

- date: 2026-06-25
  note: The Recipe Library now filters as you type, like the class list. Start typing a recipe name or an ingredient (such as ginger) and the list narrows instantly, with no Search button and no page reload.

- date: 2026-06-25
  note: The estimated grocery total on a week's orange Grocery list card now appears once you have opened that week's grocery list (it is no longer figured automatically in the background). Open the grocery list for a week and the total shows on the card from then on.

- date: 2026-06-23
  note: The printed recipe now labels every page. The full-batch pages are marked Dual station and the scaled pages Single station (the single-station amount is half the full batch, so the full batch is two stations worth).

- date: 2026-06-23
  note: On a recipe's edit page you can now ask the AI to revise the recipes in your own words (for example, "split the rolls into separate Tuna, Salmon, and Vegetarian recipes, plus one shared rice"). It rewrites the recipes for you to review and save.

- date: 2026-06-23
  note: Each recipe in a handout can now have its own headcount. Set a number next to each recipe's title (for example 1, 2, 3) and it prints on the recipe.

- date: 2026-06-21
  note: A recipe's edit page now has two tabs, Recipe and Pull sheet, so you can see the class shopping and prep list right next to the recipe without leaving the page. For a recipe shared by several classes it defaults to the soonest upcoming run, with a date dropdown to switch.

- date: 2026-06-21
  note: The Pull sheet tab now refreshes every time you open it, so equipment you just added or removed (and any saved recipe change) shows up right away instead of a stale list.

- date: 2026-06-21
  note: Generate recipe with AI is more reliable. It retries once if the AI is briefly busy, allows longer recipes so they don't get cut off, and shows a friendly "try again" message instead of a technical error if it still can't reach the model.

- date: 2026-06-21
  note: Equipment changes on a recipe now save automatically the moment you add or remove a tag, so you don't have to click Save and refresh preview just for equipment.

- date: 2026-06-21
  note: Generating or building a recipe now shows a full-screen spinner while the AI works, instead of only the thin progress bar at the top.

- date: 2026-06-21
  note: New "Generate recipe with AI" button on the Add a recipe page (when you open it from a class). It writes a draft recipe from the class name and description for you to review and edit, for when there's no recipe to upload yet. Its cost shows on the billing page as its own "Recipe generation (AI)" line.

- date: 2026-06-21
  note: Reusing a recipe packet on another class now makes its own editable copy instead of sharing one. So tweaking or removing a recipe on one class never changes or deletes it on the class you copied from. The remove button is clearer too (Remove recipe from this class).

- date: 2026-06-20
  note: In the recipe equipment picker you can now delete a tag from the list for good (tap the minus on a tag), and as you type in the Add box the matching tags highlight so they're easy to spot.

- date: 2026-06-20
  note: Fixed a phone display glitch on the agents hub where the New York Kitchen logo overlapped the workspace name and pushed it off the screen. The logo now sits above the name on narrow screens.

- date: 2026-06-19
  note: The stall poster header (logo and subhead) is now left-aligned with the class rows below it, instead of centered.

- date: 2026-06-19
  note: The flyer and stall poster headers now show just the New York Kitchen logo (the redundant "Upcoming Classes" wording next to it was removed).

- date: 2026-06-19
  note: The flyer and stall poster now show the New York Kitchen logo larger at the top, and the stall poster's footer gained the same "Check out other New York Kitchen classes" QR code to the calendar that the flyer has.

- date: 2026-06-19
  note: The printable class flyer (and stall poster) now read New York Kitchen instead of NY Kitchen, show your uploaded workspace logo at the top, and end with a "Check out other New York Kitchen classes @ nykitchen.com/calendar/" footer with its own QR code to the calendar. To show the logo, upload it under Brand logo in the display settings.

- date: 2026-06-19
  note: Owners and admins can now choose the AI model (Opus, Sonnet, or Haiku) for each feature right in the AI usage table on the billing page. A short legend explains each model's quality and cost. Use cheaper models where speed matters and pricier ones where quality matters.

- date: 2026-06-19
  note: The billing page now has a Spend by model table showing this month's AI cost split by Anthropic model (Opus and Haiku), with calls and a total, alongside the existing per-feature breakdown.

- date: 2026-06-19
  note: The grocery list date buttons are now Current week, Next week, and Next 2 weeks (full Monday to Sunday weeks). The page opens on the current week by default.

- date: 2026-06-19
  note: The grocery list date buttons are now This weekend, Current week, Next week, and Next 2 weeks (full Monday to Sunday weeks), instead of Next 7 days and Next 14 days.

- date: 2026-06-19
  note: A recipe's equipment now also shows on the weekly grocery list, grouped by class (each class lists the gear to set up at its stations), not just on the single-class pull sheet.

- date: 2026-06-19
  note: The recipe Equipment list is now a tag picker. Tap a tag to add it to the recipe, tap an added one to remove it, and type a new item to create a tag you can reuse on other recipes. The palette starts with common kitchen gear and grows as you and Caitlin add items.

- date: 2026-06-19
  note: Recipes now have an Equipment list (pots, pans, wooden spoons, and so on) you fill in on the recipe edit screen. It prints on that class's pull sheet as a per-station setup checklist, and because it lives with the recipe it shows up automatically for every run of that class.

- date: 2026-06-19
  note: Sam's class list has a search box at the top. Type a class name, a dish, or a chef and the list filters as you type, automatically opening the weeks that have a match. Clear the box to see everything again.

- date: 2026-06-19
  note: Blank lines you add between steps in the recipe editor now carry through to the printed handout, so you can group steps with a little space between them. Click Save and refresh preview to see it.

- date: 2026-06-19
  note: Recipe handouts now print in a cleaner Calibri-style font (Carlito) at a larger size, matching the look you asked for. Fractions like a half or a third now print as proper symbols instead of being spelled out.

- date: 2026-06-19
  note: Recipe handouts now show the gram weight next to flour (for example "2 c All-purpose flour (~240 g)"), since weighing flour is more accurate than measuring it by cup.

- date: 2026-06-19
  note: Pull sheets (the single-class shopping list) no longer show prices or an estimated total, so they stay clean for the cook line. The full weekly grocery list still shows prices for budgeting.

- date: 2026-06-19
  note: The Current Week grocery button now covers the full Monday to Sunday week, matching the Next Week and later buttons, instead of starting from today.

- date: 2026-06-19
  note: Recipes now follow a class to its other dates. Attach a packet to one run of a class (say Korean BBQ) and it links automatically to the other upcoming runs of the same class, including new dates as they show up on the calendar. Auto-linked classes show a small "auto" tag so you can tell, and you can always swap or remove the recipe. Because every run shares the one packet, editing the recipe updates the printout for all of them at once (the edit screen now tells you how many classes share it).

- date: 2026-06-19
  note: New Recipe Library page (the Recipes button on Sam's list) shows every recipe packet you've built in one place, with a search box that finds recipes by name or by an ingredient inside them. You can edit, print, or delete from there. When adding a recipe to a class, the reuse picker now has the same search so you can pull up any past packet, not just the most recent ones.

- date: 2026-06-19
  note: Ingredient names on recipe handouts now use consistent sentence case (only the first word capitalized, with brand and proper names like Dijon or Parmesan kept capitalized). Imported names that came in shouting in ALL CAPS are toned down automatically.

- date: 2026-06-19
  note: Recipe handouts and grocery lists now write weights in short form too (grams as g, kilograms as kg, ounces as oz, pounds as lb), matching the T/tsp/c style we already use for volumes. Numbers are never changed, just the unit spelling.

- date: 2026-06-19
  note: Recipe handout PDFs now keep the Directions on the first page next to the Ingredients. Long ingredient lists spill onto a continuation page instead of pushing the Directions down to a later page and leaving the first page half-empty.

- date: 2026-06-19
  note: On Sam's schedule, the recipe column now uses the same notepad icon for both Add and Edit (a grayed-out notepad when no recipe is attached, a colored one when there is) instead of a separate pencil for Edit.

- date: 2026-06-18
  note: On Sam's schedule, the whole "Draft Post" button (label included) is now clickable with a pointer cursor, matching Pull Sheet and Edit, instead of only the megaphone icon.

- date: 2026-06-18
  note: Recipe handouts now tidy up messy punctuation from imported recipes (stray commas and doubled parentheses around notes), so ingredient lines like "ginger (, finely grated)" read cleanly. Applies to existing handouts too.

- date: 2026-06-18
  note: The grocery list and pull sheet now use the same measurement style as the recipe handouts, Tablespoon as T, teaspoon as tsp, and cup as c.

- date: 2026-06-18
  note: Recipe handouts now show measurements in one consistent style everywhere, Tablespoon as T, teaspoon as tsp, and cup as c. Applies to existing handouts too, not just new ones.

- date: 2026-06-17
  note: Billing page now itemizes the grocery list and recipe generation AI usage and shows a 6-month spend trend, so the full monthly cost is in one place.

- date: 2026-06-17
  note: Fixed the weekly grocery list and pull sheet getting stuck on "Building..." for busy weeks with several classes. They now finish and show the full shopping list again.

- date: 2026-06-16
  note: Sam's schedule now remembers which weeks you have expanded. If you open a week (say Next Week), then click Draft Post, Pull Sheet, or a recipe and come back, that week is still open instead of everything snapping shut.

- date: 2026-06-16
  note: The recipe review screen now works on a phone. The ingredient table used to run off the side of the screen, so you could not see the Ingredient or Sub-heading columns. Each ingredient now stacks neatly, the amount and the scaled amount on one line, then the ingredient name and an optional sub-heading below.

- date: 2026-06-16
  note: The Back buttons are now consistent. Anywhere you see a back arrow (Back to Sam's list, Back to workspace) it is the same orange button on the right, matching the rest of the app. They also take you back to where you came from, so if you start a post from a class on Sam's list, Back now returns you to the class list instead of the social agent page.

- date: 2026-06-16
  note: On phones, the class list is easier to read. The Draft Post, Pull Sheet, and Edit buttons now sit in a row under each class instead of squeezing in beside it, and the full class name wraps onto a second line instead of being cut off with dots. On a computer the buttons stay where they were, on the right of each row.

- date: 2026-06-15
  note: The daily 10am email is back to the simple class list it started as, the current week plus the next three weeks, with date, price, and tickets left for each class. The Selling fastest and Needs a push leaderboards have been removed from it. Those pace and revenue views still live in the Monday and Friday team report and on the live page.

- date: 2026-06-15
  note: We now watch for classes that show no tickets available too far out to be a normal cutoff while seats are still open, which usually means a wrong sales-end date was typed in. When one turns up you get an alert the same day so it can be fixed on Tock before it quietly loses bookings. A genuine sold-out class does not trigger it.

- date: 2026-06-15
  note: The recipe button on each class row is now clearer. It says Add when a class has no recipe and Edit (pencil) when it does, and it always opens the recipe screen. You print the recipe from that screen with the Print recipe button, so the same spot no longer flips between Recipe and Print.

- date: 2026-06-14
  note: Every class row now has a Pull Sheet button (the cart icon next to the recipe button) that prints a shopping list for just that one class, handy when you are prepping a single class. The week's combined grocery card also shows the estimated total cost for the week at a glance.

- date: 2026-06-14
  note: The grocery list now knows when a class sells one ticket for two people (couples classes) and buys food for the full room instead of half. It guesses from the class description and you can correct it per class under Ticket portions on the grocery list. Recipes that serve a range like 6 to 8 are now bought for the higher number so you never run short. And if a recipe website blocks our import (some big sites do), you now get a clear message to paste the recipe or upload it as a PDF instead of a confusing error.

- date: 2026-06-14
  note: New Pantry page on Sam's schedule (tap Pantry at the top). It lists the latest price we have for each ingredient, learned from your uploaded receipts, and you can fix a price or remove a line that is not a real ingredient. Reading receipts also got smarter, we now skip bottle deposits and fees and do a better job catching the total.

- date: 2026-06-14
  note: You can now upload a photo of your grocery receipt for a week (tap Upload receipt next to the week's grocery list, or snap it right from your phone camera in the app). We read the items and prices off the receipt automatically and remember them, so each week the estimated grocery list gets closer to what you actually pay instead of a guess.

- date: 2026-06-14
  note: Argus now runs its calendar health checks twice a day (around midnight and noon) instead of every hour. That is plenty to catch a broken or wrong page quickly while keeping the checking light.

- date: 2026-06-14
  note: The walk-in display screen now matches the look of your nykitchen.com class pages, the same clean font, navy headings, and the "DAY, MONTH D @ TIME" date style, so the screen and the website feel like one brand.

- date: 2026-06-14
  note: The walk-in display screen got a fresh look. It now uses a clean white layout like the printed flyer, with the class photo, a short class description, and the reserve QR code, so it's easy to read from across the room.

- date: 2026-06-14
  note: Each class on Sam's schedule now has Draft Post and recipe buttons lined up on the right. Draft Post sends a social post to Echo (it shows on classes that are not sold out), and the recipe button lets you add a recipe and then turns into a printer you can tap to print. The recipe button always sits in the same spot so the rows line up. The grocery list is now one combined list per week, which appears inside a week once you expand it.

- date: 2026-06-14
  note: The tasting-room display monitor now shows a "Scan to reserve" QR code on each upcoming class, just like the printed flyer, so guests can book straight from the screen. You can turn it off under Display settings.

- date: 2026-06-13
  note: The Print recipe link on Sam's schedule now opens in a new tab, so your place on the schedule stays put after you print.

- date: 2026-06-13
  note: Each week's grocery cart on Sam's schedule now shows the week's ballpark grocery total right next to the cart icon, so you can see roughly what a week will cost without opening the full list. The price appears once that week's list has been built.

- date: 2026-06-13
  note: The grocery list now shows a rough price next to each item and an estimated total at the bottom, so you can budget the week at a glance. These are ballpark US grocery prices, not exact quotes.

- date: 2026-06-12
  note: On the grocery list, hover over a class tag next to an item (or tap it on a phone) to see that class's full recipe pop up, with the ingredient you are looking at highlighted. Handy for double-checking why something is on the list and how much each class needs.

- date: 2026-06-12
  note: Each week on Sam's schedule now has a little grocery cart icon (only when a class that week has a recipe). Click it to jump straight to the running grocery list for that exact week.

- date: 2026-06-12
  note: The grocery list now shows a colored tag on each item for the class (or classes) that need it, so you can see at a glance what is for which class. It also loads with a spinner and remembers the list, so opening it again or switching the date range is instant and does not cost anything unless a recipe or headcount changed.

- date: 2026-06-12
  note: New grocery list. From Sam's schedule, click "Grocery list" to get one combined shopping list for every class in the next few days that has a recipe, scaled to how many people are booked, with duplicate ingredients merged and grouped by store section. Print it Wednesday and shop for the weekend. Classes still missing a recipe are flagged so nothing gets left off.
  link: /nykitchen/grocery
  link_label: Open the grocery list

- date: 2026-06-12
  note: You can now delete a recipe from a class (open it on Sam's schedule and click "Delete this recipe"). When you build a recipe, the page now shows what the AI cost to create it, usually a few cents.

- date: 2026-06-12
  note: Recipe handouts can now be built from a PDF or a recipe link. Open a class on Sam's schedule, click "+ Recipe", and either upload a PDF or paste a link to a recipe online. The agent rebuilds it in the New York Kitchen format with the single station amounts, and you get a live PDF preview you can edit until it looks right. After saving, the class shows "Print recipe" and opens the finished PDF.
  link: /nykitchen/list
  link_label: Open Sam's schedule

- date: 2026-06-11
  note: The printed flyer now lists each class as just the name, date, price, and spots, with no menu line. Cleaner and quicker to read on the wall.
  link: /nykitchen/display/print
  link_label: Open the flyer

- date: 2026-06-11
  note: The printed flyer no longer shows class descriptions. Each class is just the name, date, price, spots, and the menu when one is listed, so the sheet is cleaner and easier to scan.
  link: /nykitchen/display/print
  link_label: Open the flyer

- date: 2026-06-11
  note: The printed flyer now shows each class menu instead of a cut-off description, and photos print in their full wide shape instead of being cropped to a square. Classes without a menu show a cleaner description that skips the booking fine print.
  link: /nykitchen/display/print
  link_label: Open the flyer

- date: 2026-06-11
  note: New on Sam's schedule page, recipe handouts. Click "+ Recipe" on any class, paste the recipe text (or upload a PDF), and the agent builds the printable packet for you, including the single station amounts, ready to review and print. Upload once and reuse the same packet every time the class runs again.
  link: /nykitchen/list
  link_label: Open Sam's schedule

- date: 2026-06-11
  note: The agent cards on your hub page now arrange themselves around how you work. The agents you open most rise to the top, and any agent that needs attention jumps straight to first place.
  link: /nykitchen
  link_label: Open the hub

- date: 2026-06-11
  note: The iOS app button in the daily email now goes straight to the App Store. The app is officially published, so there is no more TestFlight beta invite step.

- date: 2026-06-08
  note: On the Test agent page, any failed check now has a "Send report" button. You can email the full failure (what broke, the console output, and a link to the video of what happened) straight to a developer, with an optional note. No more screenshots or copy and paste.
  link: /nykitchen/test
  link_label: Open the Test agent

- date: 2026-06-08
  note: New on the Analyst dashboard, a "Generate report" button lets you pull a fresh copy of this team report whenever you need one (for example, right before a board meeting). We email a copy straight to your own inbox, and you can print it or save it as a PDF. There is a short "How it works" walkthrough on the page.
  link: /nykitchen/analyst
  link_label: Open the Analyst dashboard

- date: 2026-06-08
  note: Your team's weekly recap now lands twice a week, every Monday and Friday at 10 AM, instead of Sunday evening. Monday's covers the week that just finished; Friday's is a mid-week check on how the current week is filling. The daily "selling fast" digest still arrives at 10 AM on the other days.
  link: /nykitchen/analyst
  link_label: See the Analyst dashboard

- date: 2026-06-04
  note: Carson can now send a couple of helpful pings a day to the iOS app (on for a few of us while we try it out), like a slow sales day, flyers due for a reprint, or a class down to its last seats. Each one opens the right agent with a tap.

- date: 2026-05-31
  note: The Analyst dashboard now shows yesterday's and today's ticket sales at a glance, so you can see fresh momentum without changing the date range.

- date: 2026-05-31
  note: The sales report's current-month row is now labelled "Rest of <month>" so a near-sold-out final few classes no longer reads as if the whole month hit 100%.

- date: 2026-05-30
  note: Billing now keeps a record of each finished month. On the 1st, last month's usage is locked into a dated invoice you can see under "Past invoices", with a paid or unpaid status.

- date: 2026-05-29
  note: The sales report now looks several months ahead, with a row for each of the next few calendar months (by name, like June and July), so you can see how upcoming classes are filling before they're close.

- date: 2026-05-29
  note: New Cellar tool tracks your storage room. Scan cases in, scan bottles out, and see live bottle counts with low-stock alerts.

