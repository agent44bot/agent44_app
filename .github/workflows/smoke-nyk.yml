name: NY Kitchen Smoke Test

on:
  # Scheduled fires come from launchd on the mac mini runner
  # (~/Library/LaunchAgents/com.agent44.smoke-nyk-{nav,scrape}.plist) rather
  # than GitHub's `schedule:`, which slipped 1–2h regularly. Each plist
  # invokes `gh workflow run` with `-f test=nav|scrape` and (for nav) `-f headful=true`.
  repository_dispatch:
    types: [smoke-nyk]
  workflow_dispatch:
    inputs:
      test:
        description: "Which smoke test to run"
        type: choice
        default: all
        options:
          - all
          - nav
          - scrape
      headful:
        description: "Run Chromium headed (less bot-like fingerprint)"
        type: boolean
        default: false

jobs:
  smoke:
    runs-on: [self-hosted, macOS, nyk]
    timeout-minutes: 30
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Put RVM Ruby and NVM Node on PATH
        run: |
          echo "$HOME/.rvm/gems/ruby-3.3.6/bin" >> "$GITHUB_PATH"
          echo "$HOME/.rvm/gems/ruby-3.3.6@global/bin" >> "$GITHUB_PATH"
          echo "$HOME/.rvm/rubies/ruby-3.3.6/bin" >> "$GITHUB_PATH"
          # Pick the highest Node version that NVM has installed
          ls -1 "$HOME/.nvm/versions/node" 2>/dev/null | sort -V | tail -1 | awk -v home="$HOME" '{print home "/.nvm/versions/node/" $0 "/bin"}' >> "$GITHUB_PATH"

      - name: Show tool versions
        run: |
          which ruby && ruby -v
          which node && node -v
          which bundle && bundle -v

      - name: Install bundler deps
        run: bundle install --jobs 4 --retry 2

      - name: Install npm packages
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Prepare test database
        env:
          RAILS_ENV: test
        run: bin/rails db:test:prepare

      - name: Run NY Kitchen smoke test
        env:
          RAILS_ENV: test
          RUN_SMOKE: "true"
          API_TOKEN: ${{ secrets.API_TOKEN }}
          SMOKE_API_URL: "https://agent44-app.fly.dev"
          NYK_SMOKE_DELIVER: "true"
          NYK_SMOKE_RECIPIENTS: ${{ secrets.NYK_SMOKE_RECIPIENTS }}
          BREVO_SMTP_KEY: ${{ secrets.BREVO_SMTP_KEY }}
          VERIFY_VLAD_STATUS: "true"
          # Selection: workflow_dispatch input → repository_dispatch payload → "all"
          TEST: ${{ github.event.inputs.test || github.event.client_payload.test || 'all' }}
          HEADFUL: ${{ github.event.inputs.headful || github.event.client_payload.headful || 'false' }}
        run: |
          case "$TEST" in
            nav)    FILES="test/smoke/nyk_calendar_nav_test.rb" ;;
            scrape) FILES="test/smoke/nyk_scrape_test.rb" ;;
            all|*)  FILES="test/smoke/nyk_calendar_nav_test.rb test/smoke/nyk_scrape_test.rb test/smoke/nyk_coupon_field_test.rb" ;;
          esac
          echo "Running: bin/rails test $FILES (HEADFUL=$HEADFUL)"
          bin/rails test $FILES

      - name: Upload smoke artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-artifacts
          path: tmp/smoke/
          if-no-files-found: ignore

      # Belt-and-suspenders: even if the test process is SIGTERMed (cancel,
      # timeout, or anything skipping Minitest teardown), make sure Vlad
      # doesn't get stuck "busy" on the dashboard.
      - name: Reset Vlad to online (always)
        if: always()
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          [ -z "$API_TOKEN" ] && { echo "no API_TOKEN — skipping Vlad reset"; exit 0; }
          curl -fsS -X PATCH \
            -H "Authorization: Bearer $API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"status":"online","current_task":null}' \
            "https://agent44-app.fly.dev/api/v1/agents/Vlad%20%E2%9C%85/status" || true
