  - agent

# Title/description seniority signals (his level).
seniority_keywords: [senior, principal, staff, lead, architect, sdet]

# Roles leaning on these as core skills are a poor fit (his honest gaps).
gap_keywords: [java, "c#", ".net", kotlin, swift, scala, golang, rust, kubernetes, k8s, terraform]

# Presence flags a role as a 'dream/stretch' true agent-engineering job.
dream_keywords: [ai agent, agentic, autonomous agent, llm agent, agent engineer, multi-agent, agent framework, ai engineer]

remote_preference: strong            # Rochester, NY — remote strongly preferred
employment_open: [full_time, part_time, contract]  # PT/contract OK to ease the transition
