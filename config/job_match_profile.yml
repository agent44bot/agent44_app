# Rich Downie's job-match profile — drives JobMatcher scoring, the For You feed
# (/jobs/for-me), and the daily digest email. Tune weights/skills here; no code
# change needed. See app/lib/job_matcher.rb.

candidate:
  name: Rich Downie
  email: botwhisperer@hey.com
  location: Rochester, NY

# Pragmatic bias (his call): AI-augmented QA is the highest-ROI realistic target
# — 25 yrs SDET = instant credibility + the most listings. Agent-engineer roles
# are the dream (rarer); kept high AND additionally flagged via dream_keywords so
# they float to the top. Pure test automation is the safety net.
role_class_weights:
  ai_augmented: 40
  agent_director: 36
  traditional: 22

# Skill overlap: each skill found (word-boundary) in title+description counts;
# up to 8 contribute to the score. Lowercase.
skills:
