# TEMPORARY: copies CLAUDE_CODE_OAUTH_TOKEN to the other agent44bot repos.
# Delete after running.
name: Rollout Claude token
on: workflow_dispatch
jobs:
  copy:
    runs-on: ubuntu-latest
    env:
      TOK: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      GH_TOKEN: ${{ secrets.GH_PAT_TEMP }}
    steps:
      - run: |
          for repo in cukehub healthme nykitchen-watch; do
            gh secret set CLAUDE_CODE_OAUTH_TOKEN -R "agent44bot/$repo" --body "$TOK"
            echo "set on $repo"
          done
