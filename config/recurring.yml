# examples:
#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  # Disabled 2026-05-28: /news no longer used. This job ran daily and called
  # the Claude API (Haiku) to build the AI News digest. Re-add to resume.
  # gather_news:
  #   class: GatherNewsJob
  #   schedule: every day at 5am
  scrape_jobs:
    class: ScrapeJobsJob
    schedule: every day at 6am
  # Score the freshly-scraped jobs against Rich's profile, then AI-enrich the
  # top matches. Runs after the 6am scrape. See JobMatcher / RankJobMatchesJob.
  rank_job_matches:
    class: RankJobMatchesJob
    schedule: every day at 7am
  # Email Rich the day's new top matches (after ranking).
  job_match_digest:
    class: JobMatchDigestJob
    schedule: every day at 8:01am
  # Daily classes digest, 10am every day. On Mondays the job also prepends the
  # Carson weekly team report into the same email (so there is one 10am email,
  # every day; Monday's just leads with the team report). Updated 2026-06-19.
  kitchen_digest_email:
    class: KitchenDigestEmailJob
    schedule: "0 10 * * *"
  # No longer scheduled (2026-06-19): the weekly team report now rides along in
  # Monday's daily digest (see KitchenDigestEmailJob). WeeklySalesEmailJob and
  # the weekly_sales mailer stay for the admin preview / on-demand send.
  # nyk_weekly_sales_email:
  #   class: WeeklySalesEmailJob
  #   schedule: "0 10 * * 1"
  # Freeze last month's NY Kitchen usage into an Invoice and email it. Runs the
  # 1st at 6am; generation is idempotent so a missed/retried run is safe.
  nyk_month_close_invoice:
    class: MonthCloseInvoiceJob
    schedule: every month on the 1st at 6am
  # Disabled 2026-05-28: Pulse no longer used in the app. This job hit the
  # Claude API every 3 days to auto-write a post (credits) and pinged "Scout
  # published a new pulse post". Re-add to resume.
  # generate_newsletter:
  #   class: GenerateNewsletterJob
  #   schedule: every 3 days at 7am
  nyk_filter_card_check:
    class: NykFilterCardCheckJob
    schedule: every day at 11am
  nyk_smoke_freshness_check:
    class: NykSmokeFreshnessCheckJob
    schedule: every hour at minute 17
  refresh_x_tokens:
    class: RefreshXTokensJob
    schedule: every 30 minutes
  publish_due_drafts:
    class: PublishDueDraftsJob
    schedule: every minute
  carson_nudge:
    class: CarsonNudgeJob
    schedule: every hour at minute 23
  # Sam's class-promo drafts: hourly poll, but window + budget + dice roll mean
  # it drafts a post + pushes Rich to review at most ~2x/day at random daytime
  # hours. Off until Setting "class_promo:user_ids" names a recipient.
  class_promo_draft:
    class: ClassPromoDraftJob
    schedule: every hour at minute 47
  # Echo social listening: search Bluesky + Reddit for local food/cooking
  # conversations, score + draft replies for review on the Echo page. Off until
  # Setting "social_listen:slugs" names a workspace. Every 6 hours.
  social_listen:
    class: SocialListenJob
    schedule: "0 */6 * * *"
  # Hourly poll of X + Bluesky engagement on recent posts. Refreshes the
  # like/repost/reply counts and pushes members a "new engagement" alert when
  # any of them rises (see RefreshSocialMetricsJob#notify_new_engagement). The
  # job already self-throttles to posts not synced in the last 50 min.
  refresh_social_metrics:
    class: RefreshSocialMetricsJob
    schedule: every hour at minute 33
  device_token_prune:
    class: DeviceTokenPruneJob
    schedule: every monday at 4:41am
